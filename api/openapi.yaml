      tags: ["Tasks"]
      summary: "Supprimer une tâche"
      operationId: deleteTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: "Tâche supprimée"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "TASK_DELETED"

