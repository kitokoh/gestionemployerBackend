        salary_type:
          type: string
          enum: ["fixed", "hourly", "daily"]
        hourly_rate:
          type: number
          format: double
          nullable: true
        payment_method:
          type: string
          enum: ["bank_transfer", "cash", "cheque"]
        iban:
          type: string
          nullable: true
          description: "Chiffré AES-256 côté serveur"
        leave_balance:
          type: number
          format: double
          example: 12.5
        photo_url:
          type: string
          format: uri
          nullable: true
        status:
          type: string
          enum: ["active", "suspended", "archived"]

    EmployeeCreated:
