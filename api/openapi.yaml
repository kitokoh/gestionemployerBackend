          type: string
          example: "08:00:00"

    AttendanceLog:
      type: object
      properties:
        id:
          type: integer
          example: 5432
        date:
          type: string
          format: date
          example: "2026-04-15"
        session_number:
          type: integer
          description: "1 = session principale, 2 = split-shift"
          example: 1
        check_in:
          type: string
          format: date-time
          nullable: true
        check_out:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: ["ontime", "late", "absent", "leave", "holiday", "incomplete"]
        method:
          type: string
          enum: ["mobile", "qrcode", "biometric", "manual"]
        hours_worked:
          type: number
          format: double
          nullable: true
        overtime_hours:
          type: number
          format: double
          nullable: true

    AttendanceLogWithEmployee:
      allOf:
        - $ref: "#/components/schemas/AttendanceLog"
        - type: object
          properties:
            employee:
              $ref: "#/components/schemas/EmployeeRef"
            is_manual_edit:
              type: boolean

    EditAttendanceRequest:
      type: object
      required: ["reason"]
      properties:
        check_in:
          type: string
          format: date-time
        check_out:
          type: string
          format: date-time
        reason:
          type: string
          description: "Motif de la correction (obligatoire)"
          example: "Erreur de pointage biométrique"

    # ----------------------------------------------------------
    # Absences
    # ----------------------------------------------------------
    AbsenceType:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
          example: "Congé payé"
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          example: "#4CAF50"
        is_paid:
          type: boolean
        requires_document:
          type: boolean

    AbsenceTypeRequest:
      type: object
      required: ["label"]
      properties:
        label:
          type: string
        color:
          type: string
          default: "#4CAF50"
        is_paid:
          type: boolean
          default: true
        requires_document:
          type: boolean
          default: false

    AbsenceRequest:
      type: object
      required: ["absence_type_id", "start_date", "end_date"]
      properties:
        absence_type_id:
          type: integer
          example: 1
        start_date:
          type: string
          format: date
          example: "2026-08-01"
        end_date:
          type: string
          format: date
          example: "2026-08-15"
        comment:
          type: string

    Absence:
      type: object
      properties:
        id:
          type: integer
          example: 801
        employee:
          $ref: "#/components/schemas/EmployeeRef"
        type:
          type: object
          properties:
            id:
              type: integer
            label:
              type: string
              example: "Congé payé"
            color:
              type: string
              example: "#4CAF50"
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        days_count:
          type: integer
          description: "Nombre de jours ouvrés calculé automatiquement"
          example: 11
        status:
          type: string
          enum: ["pending", "approved", "rejected", "cancelled"]
        comment:
          type: string
          nullable: true
        approved_by:
          $ref: "#/components/schemas/EmployeeRef"
          nullable: true
        created_at:
          type: string
          format: date-time

    # ----------------------------------------------------------
    # Advances
    # ----------------------------------------------------------
    AdvanceRequest:
      type: object
      required: ["amount", "reason", "repayment_months"]
      properties:
        amount:
          type: number
          format: double
          example: 15000
        reason:
          type: string
          example: "Frais médicaux urgents"
        repayment_months:
          type: integer
          minimum: 1
          maximum: 12
          example: 3

    SalaryAdvance:
      type: object
      properties:
        id:
          type: integer
          example: 301
        employee:
          $ref: "#/components/schemas/EmployeeRef"
        amount:
          type: number
          format: double
          example: 15000
        amount_remaining:
          type: number
          format: double
          nullable: true
          example: 10000
        reason:
          type: string
          nullable: true
        status:
          type: string
          enum: ["pending", "approved", "rejected", "active", "repaid"]
        repayment_months:
          type: integer
          nullable: true
          example: 3
        monthly_deduction:
          type: number
          format: double
          nullable: true
          example: 5000
        approved_at:
          type: string
          format: date-time
          nullable: true

    # ----------------------------------------------------------
    # Payroll
    # ----------------------------------------------------------
    PayrollCalculateRequest:
      type: object
      required: ["employee_ids", "month", "year"]
      properties:
        employee_ids:
          type: array
          items:
            type: integer
          example: [42, 43, 44]
        month:
          type: integer
          minimum: 1
          maximum: 12
          example: 4
        year:
          type: integer
          minimum: 2020
          example: 2026

    PayrollCalculation:
      type: object
      properties:
        employee_id:
          type: integer
        gross_salary:
          type: number
          format: double
          example: 75000
        overtime_pay:
          type: number
          format: double
          example: 2500
        deductions:
          type: object
          properties:
            social_security:
              type: number
              example: 7500
            income_tax:
              type: number
              example: 4250
            penalty_deduction:
              type: number
              example: 0
            advance_deduction:
              type: number
              example: 5000
            absence_deduction:
              type: number
              example: 0
        net_salary:
          type: number
          format: double
          example: 60750
        advance_remaining_after:
          type: number
          format: double
          nullable: true

    Payroll:
      type: object
      properties:
        id:
          type: integer
          example: 401
        employee:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            matricule:
              type: string
        period:
          type: string
          example: "Avril 2026"
        month:
          type: integer
        year:
          type: integer
        gross_salary:
          type: number
          format: double
        net_salary:
          type: number
          format: double
        status:
          type: string
          enum: ["draft", "validated"]
        pdf_url:
          type: string
          format: uri
          nullable: true

    PayrollDetail:
      allOf:
        - $ref: "#/components/schemas/Payroll"
