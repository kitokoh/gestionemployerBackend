          type: integer
          example: 42
        matricule:
          type: string
          example: "EMP-0042"
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        role:
          type: string
          enum: ["manager", "employee"]
        manager_role:
          type: string
          nullable: true
        department:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
        position:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
