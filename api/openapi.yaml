          properties:
            employee:
              type: object
              properties:
                id:
                  type: integer
                name:
                  type: string
                matricule:
                  type: string
                iban:
                  type: string
                  nullable: true
            overtime_pay:
              type: number
              format: double
            deductions:
              type: object
              properties:
                social_security:
                  type: number
                income_tax:
                  type: number
                penalty_deduction:
                  type: number
                advance_deduction:
                  type: number
                absence_deduction:
                  type: number
            validated_at:
              type: string
              format: date-time
              nullable: true

    PayslipSummary:
      type: object
      properties:
        id:
          type: integer
        period:
          type: string
        month:
          type: integer
        year:
          type: integer
        salary_base:
          type: number
        net_salary:
          type: number
        status:
          type: string
        pdf_url:
          type: string
          format: uri

    PayrollJobStatus:
      type: object
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: ["queued", "processing", "completed", "failed"]
        progress:
          type: integer
          description: "Pourcentage de progression (0-100)"
          example: 67
        completed:
          type: integer
        total:
          type: integer
        errors:
          type: array
          items:
            type: string

    # ----------------------------------------------------------
    # Tasks
    # ----------------------------------------------------------
    Task:
      type: object
      properties:
        id:
          type: integer
          example: 901
        title:
          type: string
          example: "Finaliser le module mobile"
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: ["todo", "inprogress", "review", "done", "rejected", "cancelled"]
        priority:
          type: string
          enum: ["low", "normal", "high", "urgent"]
        assignee:
          $ref: "#/components/schemas/EmployeeRef"
          nullable: true
        project:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
        due_date:
          type: string
          format: date-time
        checklist:
          type: array
          nullable: true
          items:
            type: object
            properties:
              id:
                type: integer
              label:
                type: string
              done:
                type: boolean
        comments_count:
          type: integer
          example: 3

    CreateTaskRequest:
      type: object
      required: ["title", "due_date"]
      properties:
        title:
          type: string
        description:
          type: string
        assignee_id:
          type: integer
        project_id:
          type: integer
        priority:
          type: string
          enum: ["low", "normal", "high", "urgent"]
          default: "normal"
        due_date:
          type: string
          format: date-time
        checklist:
          type: array
          items:
            type: object
            properties:
              label:
                type: string

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        assignee_id:
          type: integer
        project_id:
          type: integer
        priority:
          type: string
          enum: ["low", "normal", "high", "urgent"]
        due_date:
          type: string
          format: date-time

    TaskComment:
      type: object
      properties:
        id:
          type: integer
        author:
          $ref: "#/components/schemas/EmployeeRef"
        content:
          type: string
        created_at:
          type: string
          format: date-time

    # ----------------------------------------------------------
    # Projects
    # ----------------------------------------------------------
    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "Leopardo Mobile v1"
        status:
          type: string
          enum: ["active", "completed", "archived"]
        manager:
          $ref: "#/components/schemas/EmployeeRef"
        tasks_count:
          type: integer
          example: 12
        tasks_done:
          type: integer
          example: 7

    # ----------------------------------------------------------
    # Departments, Positions, Schedules, Sites
    # ----------------------------------------------------------
    Department:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "Développement"
        employees_count:
          type: integer
          example: 18

    Position:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "Développeur Senior"
        department_id:
          type: integer

    Schedule:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "Standard 8h-17h"
        start_time:
          type: string
          example: "08:00:00"
        end_time:
          type: string
          example: "17:00:00"
        break_minutes:
          type: integer
          example: 60
        days:
          type: array
          items:
            type: string
          example: ["monday", "tuesday", "wednesday", "thursday", "friday"]
        late_tolerance_minutes:
          type: integer
          example: 10
        overtime_threshold_daily:
          type: number
          format: double
          example: 8.0

    CreateScheduleRequest:
      type: object
      required: ["name", "start_time", "end_time", "days"]
      properties:
        name:
          type: string
        start_time:
          type: string
          example: "22:00:00"
        end_time:
          type: string
          example: "06:00:00"
        break_minutes:
          type: integer
          default: 60
        days:
          type: array
          items:
            type: string
          example: ["monday", "tuesday", "wednesday", "thursday", "friday"]
        late_tolerance_minutes:
          type: integer
          default: 15
        overtime_threshold_daily:
          type: number
          format: double
          default: 8.0

    Site:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "Siège social Alger"
        address:
          type: string
          nullable: true
        gps_lat:
          type: number
          format: double
          nullable: true
          example: 36.7375
        gps_lng:
          type: number
          format: double
          nullable: true
          example: 3.0868
        gps_radius_meters:
          type: integer
          example: 100
        timezone:
          type: string
          example: "Africa/Algiers"

    SiteRequest:
      type: object
      required: ["name"]
      properties:
        name:
          type: string
        address:
          type: string
        gps_lat:
          type: number
          format: double
        gps_lng:
          type: number
          format: double
        gps_radius_meters:
          type: integer
          default: 100
        timezone:
          type: string
          default: "Africa/Algiers"

    # ----------------------------------------------------------
    # Devices
    # ----------------------------------------------------------
    Device:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "ZKTeco Entrée principale"
        type:
          type: string
          enum: ["zkteco", "qrcode_terminal", "tablet"]
        model:
          type: string
          nullable: true
          example: "ZK-X800"
        ip_address:
          type: string
          nullable: true
        site:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
        status:
          type: string
          enum: ["active", "inactive", "error"]
        last_sync_at:
          type: string
          format: date-time
          nullable: true

    # ----------------------------------------------------------
    # Notifications
    # ----------------------------------------------------------
    Notification:
      type: object
      properties:
        id:
          type: integer
          example: 551
        type:
          type: string
          description: "Type de notification pour le routage"
          example: "absence_approved"
        title:
          type: string
          example: "Absence approuvée"
        body:
          type: string
          example: "Votre demande de congé du 01/06 au 15/06 a été approuvée."
        data:
          type: object
          description: "Données pour le deep link (ex: absence_id)"
          example:
            absence_id: 801
        is_read:
          type: boolean
          default: false
        created_at:
          type: string
          format: date-time

    # ----------------------------------------------------------
    # Settings
    # ----------------------------------------------------------
    CompanySettings:
      type: object
      properties:
        company_name:
          type: string
        language:
          type: string
          example: "fr"
        timezone:
          type: string
          example: "Africa/Algiers"
        currency:
          type: string
          example: "DZD"
        hr_model:
          type: string
          example: "algeria"
        payroll_day:
          type: integer
          example: 28
        leave_accrual_monthly:
          type: number
          format: double
          example: 2.5
        max_carry_over_days:
          type: integer
          example: 15
        overtime_rate_multiplier:
          type: number
          format: double
          example: 1.5
        late_tolerance_minutes:
          type: integer
          example: 10
        logo_url:
          type: string
          format: uri
          nullable: true

    CompanySettingsUpdate:
      type: object
      description: "Champs partiels acceptés"
      properties:
        payroll_day:
          type: integer
        leave_accrual_monthly:
          type: number
          format: double
        max_carry_over_days:
          type: integer
        overtime_rate_multiplier:
          type: number
          format: double
        late_tolerance_minutes:
          type: integer
        language:
          type: string
        timezone:
          type: string

    HrModel:
      type: object
      properties:
        code:
          type: string
          example: "algeria"
        name:
          type: string
          example: "Algérie (DAS, IRG)"
        currency:
          type: string
          example: "DZD"

    # ----------------------------------------------------------
    # Super Admin / Billing
    # ----------------------------------------------------------
    AdminCompany:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "TechCorp SPA"
        plan:
          type: object
          properties:
            name:
              type: string
              example: "Business"
        employees_count:
          type: integer
          example: 47
        status:
          type: string
          enum: ["active", "trial", "suspended", "expired"]
        subscription_ends_at:
          type: string
          format: date
        tenancy_type:
          type: string
          enum: ["schema", "shared"]
        created_at:
          type: string
          format: date-time

    AdminCreateCompanyRequest:
      type: object
      required: ["name", "email", "plan_id", "admin_first_name", "admin_last_name", "admin_password"]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        plan_id:
          type: integer
        language:
          type: string
          default: "fr"
        timezone:
          type: string
          default: "Africa/Algiers"
        currency:
          type: string
          default: "DZD"
        hr_model:
          type: string
          default: "algeria"
        tenancy_type:
          type: string
          enum: ["schema", "shared"]
          default: "shared"
        admin_first_name:
          type: string
        admin_last_name:
          type: string
        admin_password:
          type: string
          format: password

    Plan:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "Business"
        price_monthly:
          type: number
          format: double
          example: 29.99
        price_yearly:
          type: number
          format: double
          example: 299.88
        max_employees:
          type: integer
          nullable: true
          description: "NULL = illimité (Enterprise)"
        features:
          type: object
          example:
            biometric: true
            tasks: true
            bank_export: true
        trial_days:
          type: integer
          default: 14
        is_active:
          type: boolean

    PlanRequest:
      type: object
      required: ["name", "price_monthly", "price_yearly"]
      properties:
        name:
          type: string
        price_monthly:
          type: number
          format: double
        price_yearly:
          type: number
          format: double
        max_employees:
          type: integer
          nullable: true
        features:
          type: object
        trial_days:
          type: integer

    Invoice:
      type: object
      properties:
        id:
          type: integer
        company_id:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        currency:
          type: string
          example: "EUR"
        period:
          type: string
          example: "2026-04"
        status:
          type: string
          enum: ["draft", "sent", "paid", "overdue", "cancelled"]
        due_date:
          type: string
          format: date
        paid_at:
          type: string
          format: date-time
          nullable: true

    Language:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
          example: "fr"
        name:
          type: string
          example: "Français"
        direction:
          type: string
          enum: ["ltr", "rtl"]
        is_active:
          type: boolean
