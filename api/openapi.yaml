        Retourne le détail des cotisations, impôts, retenues et le salaire net.
      operationId: calculatePayroll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayrollCalculateRequest"
      responses:
        "200":
          description: "Résultat de la simulation"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PayrollCalculation"

  /payroll/validate:
    post:
      tags: ["Payroll"]
      summary: "Valider et générer la paie"
      description: "Valide les bulletins et génère les PDF en arrière-plan (job queue)."
      operationId: validatePayroll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayrollCalculateRequest"
      responses:
        "202":
          description: "Génération en file d'attente"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      job_id:
                        type: string
                        example: "payroll_job_abc123"
                      message:
                        type: string
                        example: "PAYROLL_GENERATION_QUEUED"
                      employees_count:
                        type: integer
                        example: 3

  /payroll:
