            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleRequest"
      responses:
        "200":
          description: "Planning mis à jour"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Schedule"

    delete:
      tags: ["Schedules"]
      summary: "Supprimer un planning"
      operationId: deleteSchedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: "Planning supprimé"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "SCHEDULE_DELETED"
        "409":
          description: "Planning utilisé par des employés"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "SCHEDULE_IN_USE"
                message: "Ce planning est assigné à des employés."

  # ============================================================
  # SITES
  # ============================================================
  /sites:
    get:
      tags: ["Sites"]
