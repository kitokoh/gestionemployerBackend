openapi: "3.0.3"

info:
  title: "Leopardo RH API"
  version: "3.3.2"
  description: |
    API REST de la plateforme SaaS Leopardo RH — Gestion des Ressources Humaines multitenant.
    Développée avec Laravel 11 et PostgreSQL, elle couvre la gestion des employés,
    le pointage (présence), les absences, les avances sur salaire, la paie, les tâches,
    les projets, les évaluations, les rapports, les notifications et l'administration.

    ## Conventions
    - **Authentification** : Bearer token Sanctum via header `Authorization: Bearer {token}`
    - **Content-Type** : `application/json` (sauf import fichier)
    - **Dates** : Format ISO 8601 (`2026-04-15T08:30:00Z`)
    - **Heures** : Format `HH:MM:SS` (`08:30:00`)
    - **Décimaux** : Point `.` comme séparateur
    - **Pagination** : Query params `?page=1&per_page=15`
    - **Rate limit** : 60 requêtes/min par token

    ## Format de réponse standard
    - Succès : `{ "data": { ... } }` ou `{ "data": [...], "meta": { "current_page": 1, "last_page": 5, "per_page": 15, "total": 74 } }`
    - Erreur : `{ "error": "CODE_ERREUR", "message": "Description", "errors": { "field": ["message"] } }`

  contact:
    name: "Leopardo RH"
    email: "support@leopardo-rh.com"
    url: "https://www.leopardo-rh.com"

servers:
  - url: "https://api.leopardo-rh.com/api/v1"
    description: "Serveur de production"

security:
  - BearerAuth: []

tags:
  - name: "Auth"
    description: "Authentification et gestion de session"
  - name: "Onboarding"
    description: "Inscription publique et auto-onboarding"
  - name: "Employees"
    description: "Gestion des employés"
  - name: "Attendance"
    description: "Pointage et suivi de présence"
  - name: "Absences"
    description: "Gestion des absences et congés"
  - name: "Advances"
    description: "Avances sur salaire et remboursements"
  - name: "Payroll"
    description: "Calcul et gestion de la paie"
  - name: "Tasks"
    description: "Gestion des tâches et commentaires"
  - name: "Projects"
    description: "Gestion des projets"
  - name: "Departments"
    description: "Départements de l'entreprise"
  - name: "Positions"
    description: "Postes et fonctions"
  - name: "Schedules"
    description: "Plannings de travail (horaires)"
  - name: "Sites"
    description: "Lieux de travail (sites géolocalisés)"
  - name: "Devices"
    description: "Appareils biométriques ZKTeco et QR"
  - name: "Notifications"
    description: "Notifications push et in-app"
  - name: "Profile"
    description: "Profil de l'utilisateur connecté"
  - name: "Settings"
    description: "Paramètres de l'entreprise"
  - name: "Evaluations"
    description: "Évaluations des employés"
  - name: "Reports"
    description: "Rapports et statistiques"
  - name: "Admin"
    description: "Administration (rôles manager)"
  - name: "SuperAdmin"
    description: "Administration de la plateforme"
  - name: "Billing"
    description: "Facturation et abonnements"

paths:
  # ============================================================
  # AUTHENTIFICATION
  # ============================================================
  /auth/login:
    post:
      tags: ["Auth"]
      summary: "Connexion"
      description: "Authentifie un utilisateur et retourne un token Sanctum avec ses informations."
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: "ahmed.benali@entreprise.com"
              password: "MonMotDePasse123!"
              device_name: "iPhone 15 Pro"
              fcm_token: "fcm_abc123..."
      responses:
        "200":
          description: "Connexion réussie"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: "Identifiants invalides"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "INVALID_CREDENTIALS"
                message: "Email ou mot de passe incorrect."
        "403":
          description: "Compte suspendu ou abonnement expiré"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "ACCOUNT_SUSPENDED"
                message: "Votre entreprise est suspendue. Contactez le support."
        "422":
          description: "Données invalides"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /auth/logout:
    post:
      tags: ["Auth"]
      summary: "Déconnexion"
      description: "Révoque le token Sanctum actuel de l'utilisateur."
      operationId: authLogout
      responses:
        "200":
          description: "Déconnexion réussie"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "LOGGED_OUT"

  /auth/me:
    get:
      tags: ["Auth"]
      summary: "Utilisateur actuel"
      description: "Retourne les informations complètes de l'utilisateur authentifié avec sa relation entreprise."
      operationId: authMe
      responses:
        "200":
          description: "Informations de l'utilisateur"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/forgot-password:
    post:
      tags: ["Auth"]
      summary: "Mot de passe oublié"
      description: "Envoie un email de réinitialisation de mot de passe."
      operationId: authForgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["email"]
              properties:
                email:
                  type: string
                  format: email
                  example: "ahmed.benali@entreprise.com"
      responses:
        "200":
          description: "Email de réinitialisation envoyé"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "RESET_EMAIL_SENT"

  /auth/reset-password:
    post:
      tags: ["Auth"]
      summary: "Réinitialiser le mot de passe"
      description: "Réinitialise le mot de passe avec le token reçu par email."
      operationId: authResetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["token", "email", "password", "password_confirmation"]
              properties:
                token:
                  type: string
                  example: "reset_token_from_email"
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
                password_confirmation:
                  type: string
      responses:
        "200":
          description: "Mot de passe réinitialisé"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "PASSWORD_RESET_SUCCESS"
        "422":
          description: "Token invalide ou expiré"

  /auth/device/fcm:
    post:
      tags: ["Auth"]
      summary: "Enregistrer un appareil FCM"
      description: "Enregistre le token FCM d'un appareil pour les push notifications."
      operationId: authDeviceFcmRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FcmDeviceRequest"
      responses:
        "200":
          description: "Appareil enregistré"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "FCM_TOKEN_REGISTERED"
    delete:
      tags: ["Auth"]
      summary: "Supprimer un appareil FCM"
      description: "Retire le token FCM d'un appareil."
      operationId: authDeviceFcmDelete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["fcm_token"]
              properties:
                fcm_token:
                  type: string
                  example: "fcm_xyz789..."
      responses:
        "200":
          description: "Appareil supprimé"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "FCM_TOKEN_REMOVED"

  # ============================================================
  # ONBOARDING PUBLIC
  # ============================================================
  /public/register:
    post:
      tags: ["Onboarding"]
      summary: "Inscription auto-onboarding"
      description: |
        Crée un compte Trial sans intervention du Super Admin.
        Accessible sans authentification. Rate limit : 3 requêtes/heure/IP.
        Crée automatiquement l'entreprise, le schéma tenant, le manager et les paramètres RH.
      operationId: publicRegister
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              company_name: "Entreprise SARL"
              manager_email: "contact@entreprise.com"
              manager_password: "MotDePasse123!"
              country: "DZ"
              estimated_employees: 15
              plan: "starter"
      responses:
        "201":
          description: "Compte créé avec succès"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "422":
          description: "Email déjà utilisé ou données invalides"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "EMAIL_ALREADY_EXISTS"
                message: "Cet email est déjà enregistré."

  # ============================================================
  # EMPLOYÉS
  # ============================================================
  /employees:
    get:
      tags: ["Employees"]
      summary: "Lister les employés"
      description: "Retourne la liste paginée des employés de l'entreprise avec filtres optionnels."
      operationId: listEmployees
      parameters:
        - name: department_id
          in: query
          description: "Filtrer par département"
          schema:
            type: integer
        - name: status
          in: query
          description: "Filtrer par statut"
          schema:
            type: string
            enum: ["active", "suspended", "archived"]
        - name: search
          in: query
          description: "Recherche par nom ou email"
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: "Liste des employés"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/EmployeeSummary"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: ["Employees"]
      summary: "Créer un employé"
      description: "Crée un nouvel employé dans l'entreprise. Vérifie la limite du plan (PlanLimitMiddleware)."
      operationId: createEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeRequest"
      responses:
        "201":
          description: "Employé créé"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/EmployeeCreated"
        "403":
          description: "Limite du plan atteinte"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "PLAN_EMPLOYEE_LIMIT_REACHED"
                message: "Votre plan Starter est limité à 20 employés. Passez au plan Business pour continuer."
                data:
                  current_count: 20
                  plan_limit: 20
                  plan: "Starter"
                  upgrade_url: "https://app.leopardo-rh.com/settings/billing"
        "422":
          description: "Données invalides"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /employees/{id}:
    get:
      tags: ["Employees"]
      summary: "Détails d'un employé"
      description: "Retourne les informations complètes d'un employé avec ses relations."
      operationId: getEmployee
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      responses:
        "200":
          description: "Détails de l'employé"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Employee"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: ["Employees"]
      summary: "Modifier un employé"
      description: "Met à jour les informations d'un employé (champs partiels acceptés)."
      operationId: updateEmployee
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeRequest"
      responses:
        "200":
          description: "Employé mis à jour"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Employee"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: "Données invalides"

    delete:
      tags: ["Employees"]
      summary: "Archiver un employé"
      description: "Soft delete — archive l'employé sans supprimer ses données historiques."
      operationId: deleteEmployee
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
      responses:
        "200":
          description: "Employé archivé"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "EMPLOYEE_ARCHIVED"
        "404":
          $ref: "#/components/responses/NotFound"

  /employees/import:
    post:
      tags: ["Employees"]
      summary: "Importer des employés"
      description: |
        Importe un fichier CSV d'employés en arrière-plan.
        Colonnes attendues : first_name, last_name, email, department_id, position_id, hire_date, salary_base
      operationId: importEmployees
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: ["file"]
              properties:
                file:
                  type: string
                  format: binary
                  description: "Fichier CSV des employés"
      responses:
        "202":
          description: "Import en file d'attente"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      job_id:
                        type: string
                        example: "import_abc123"
                      total_rows:
                        type: integer
                        example: 45
                      message:
                        type: string
                        example: "IMPORT_QUEUED"

  /employees/{id}/payslips:
    get:
      tags: ["Employees", "Payroll"]
      summary: "Bulletins de paie d'un employé"
      description: "Retourne la liste des bulletins de paie d'un employé."
      operationId: getEmployeePayslips
      parameters:
        - $ref: "#/components/parameters/EmployeeId"
        - name: year
          in: query
          schema:
            type: integer
            example: 2026
      responses:
        "200":
          description: "Liste des bulletins"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PayslipSummary"

  # ============================================================
  # POINTAGE (ATTENDANCE)
  # ============================================================
  /attendance/check-in:
    post:
      tags: ["Attendance"]
      summary: "Pointer l'arrivée"
      description: "Enregistre l'arrivée de l'employé avec vérification GPS optionnelle."
      operationId: attendanceCheckIn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInRequest"
      responses:
        "201":
          description: "Arrivée enregistrée"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AttendanceLog"
        "409":
          description: "Déjà pointé"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "ALREADY_CHECKED_IN"
                message: "Vous avez déjà pointé votre arrivée aujourd'hui."
        "422":
          description: "Hors zone GPS ou planning manquant"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "GPS_OUTSIDE_ZONE"
                message: "Vous êtes hors du périmètre géolocalisé du site."

  /attendance/check-out:
    post:
      tags: ["Attendance"]
      summary: "Pointer le départ"
      description: "Enregistre le départ de l'employé et calcule les heures travaillées."
      operationId: attendanceCheckOut
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckOutRequest"
      responses:
        "200":
          description: "Départ enregistré"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AttendanceLog"
        "422":
          description: "Pas d'arrivée enregistrée ou départ avant l'arrivée"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "MISSING_CHECK_IN"
                message: "Aucune arrivée enregistrée pour aujourd'hui."

  /attendance/today:
    get:
      tags: ["Attendance"]
      summary: "Pointage du jour"
      description: "Retourne le pointage du jour de l'employé connecté ou null avec le contexte (férié, congé, heure attendue)."
      operationId: attendanceToday
      responses:
        "200":
          description: "Pointage du jour"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AttendanceLog"
                  context:
                    $ref: "#/components/schemas/AttendanceContext"

  /attendance:
    get:
      tags: ["Attendance"]
      summary: "Historique de pointage"
      description: "Retourne l'historique de pointage avec filtres (admin/manager)."
      operationId: listAttendance
      parameters:
        - name: employee_id
          in: query
          description: "Filtrer par employé"
          schema:
            type: integer
        - name: month
          in: query
          description: "Mois (1-12)"
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: year
          in: query
          schema:
            type: integer
        - name: status
          in: query
          description: "Filtrer par statut"
          schema:
            type: string
            enum: ["ontime", "late", "absent", "leave", "holiday", "incomplete"]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 15
      responses:
        "200":
          description: "Liste des pointages"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AttendanceLogWithEmployee"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /attendance/{id}:
    put:
      tags: ["Attendance"]
      summary: "Corriger un pointage"
      description: "Correction manuelle par un gestionnaire. Marque automatiquement is_manual_edit à true."
      operationId: updateAttendance
      parameters:
        - name: id
          in: path
          required: true
          description: "ID du log de pointage"
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditAttendanceRequest"
      responses:
        "200":
          description: "Pointage corrigé"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AttendanceLogWithEmployee"
        "404":
          $ref: "#/components/responses/NotFound"

  /attendance/qrcode:
    post:
      tags: ["Attendance"]
      summary: "Pointage par QR Code"
      description: "Enregistre un pointage (arrivée ou départ) via QR code avec vérification GPS."
      operationId: attendanceQrCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["qr_payload"]
              properties:
                qr_payload:
                  type: string
                  example: "LEO-SITE-1-2026-04-15"
                gps_lat:
                  type: number
                  format: double
                  example: 36.7375
                gps_lng:
                  type: number
                  format: double
                  example: 3.0868
      responses:
        "201":
          description: "Pointage enregistré via QR"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AttendanceLog"

  /attendance/biometric:
    post:
      tags: ["Attendance", "Devices"]
      summary: "Webhook biométrique ZKTeco"
      description: "Endpoint webhook pour les lecteurs biométriques ZKTeco."
      operationId: attendanceBiometric
      security: []
      parameters:
        - name: X-Device-Token
          in: header
          required: true
          description: "Token d'authentification de l'appareil"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["zkteco_id", "event_type", "device_id", "timestamp"]
              properties:
                zkteco_id:
                  type: string
                  example: "00042"
                event_type:
                  type: string
                  enum: ["check_in", "check_out"]
                device_id:
                  type: string
                  example: "ZK-ALGER-01"
                timestamp:
                  type: string
                  format: date-time
      responses:
        "200":
          description: "Pointage enregistré"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "ATTENDANCE_RECORDED"
        "401":
          description: "Token appareil invalide"

  # ============================================================
  # ABSENCES
  # ============================================================
  /absences:
    get:
      tags: ["Absences"]
      summary: "Lister les absences"
      description: "Retourne la liste des demandes d'absence avec filtres."
      operationId: listAbsences
      parameters:
        - name: employee_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: ["pending", "approved", "rejected", "cancelled"]
        - name: month
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 15
      responses:
        "200":
          description: "Liste des absences"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Absence"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

    post:
      tags: ["Absences"]
      summary: "Demander une absence"
      description: "Crée une demande d'absence (congé, maladie, etc.). Vérifie le solde de congés."
      operationId: createAbsence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AbsenceRequest"
      responses:
        "201":
          description: "Demande créée"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Absence"
        "422":
          description: "Solde insuffisant ou conflit de dates"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
