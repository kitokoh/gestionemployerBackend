          example: 75000
        iban:
          type: string
        zkteco_id:
          type: string
        contract_type:
          type: string
          enum: ["CDI", "CDD", "Stage", "Interim", "Consultant"]
        gender:
          type: string
          enum: ["M", "F"]
        date_of_birth:
          type: string
          format: date

    UpdateEmployeeRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        department_id:
          type: integer
        position_id:
          type: integer
        schedule_id:
          type: integer
        site_id:
          type: integer
        salary_base:
          type: number
          format: double
        iban:
          type: string
