      responses:
        "200":
          description: "Liste des sites"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Site"

    post:
      tags: ["Sites"]
      summary: "Créer un site"
      operationId: createSite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteRequest"
      responses:
        "201":
          description: "Site créé"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Site"

  /sites/{id}:
    put:
      tags: ["Sites"]
      summary: "Modifier un site"
      operationId: updateSite
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteRequest"
      responses:
        "200":
          description: "Site mis à jour"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Site"

    delete:
      tags: ["Sites"]
      summary: "Supprimer un site"
      operationId: deleteSite
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: "Site supprimé"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "SITE_DELETED"

  # ============================================================
  # APPAREILS (DEVICES)
  # ============================================================
  /devices:
    get:
      tags: ["Devices"]
      summary: "Lister les appareils"
      description: "Retourne les appareils biométriques et QR enregistrés."
      operationId: listDevices
      responses:
        "200":
          description: "Liste des appareils"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Device"

    post:
      tags: ["Devices"]
      summary: "Enregistrer un appareil"
      description: "Ajoute un nouvel appareil biométrique ou terminal QR."
      operationId: createDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["name", "type", "site_id"]
              properties:
                name:
                  type: string
                  example: "QR Code Salle B"
                type:
                  type: string
                  enum: ["zkteco", "qrcode_terminal", "tablet"]
                site_id:
                  type: integer
                  example: 1
                model:
                  type: string
                  example: "ZK-X800"
      responses:
        "201":
          description: "Appareil créé avec token"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Device"

  /devices/{id}:
    put:
      tags: ["Devices"]
      summary: "Modifier un appareil"
      operationId: updateDevice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                ip_address:
                  type: string
      responses:
        "200":
          description: "Appareil mis à jour"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Device"

    delete:
      tags: ["Devices"]
      summary: "Supprimer un appareil"
      operationId: deleteDevice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: "Appareil supprimé"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "DEVICE_DELETED"

  /devices/{id}/rotate-token:
    post:
      tags: ["Devices"]
      summary: "Renouveler le token d'un appareil"
      description: "Réservé aux rôles principal et rh. Utilisé en cas de compromission du token."
      operationId: rotateDeviceToken
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: "Token renouvelé"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      device_id:
                        type: integer
                      new_token:
                        type: string
                        example: "lrh_tkn_9f3a..."
                      rotated_at:
                        type: string
                        format: date-time
                      message:
                        type: string
                        example: "Token renouvelé. Reconfigurer l'appareil avec le nouveau token."
        "403":
          $ref: "#/components/responses/Forbidden"

  /devices/{id}/test-connection:
    post:
      tags: ["Devices"]
      summary: "Tester la connexion d'un appareil"
      description: "Vérifie la connectivité et retourne la latence et la version firmware."
      operationId: testDeviceConnection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: "Résultat du test"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: ["reachable", "unreachable"]
                      latency_ms:
                        type: integer
                        example: 23
                      firmware:
                        type: string
                        example: "ZEM800-2.4.13"
                      error:
                        type: string
                        example: "CONNECTION_TIMEOUT"

  # ============================================================
  # NOTIFICATIONS
  # ============================================================
  /notifications:
    get:
      tags: ["Notifications"]
      summary: "Lister les notifications"
      description: "Retourne les notifications de l'utilisateur avec filtres."
      operationId: listNotifications
      parameters:
        - name: is_read
          in: query
          schema:
            type: boolean
        - name: type
          in: query
          description: "Type de notification"
          schema:
            type: string
            enum: ["absence_approved", "absence_rejected", "advance_approved", "advance_rejected", "task_assigned", "task_commented", "payslip_available", "evaluation_received"]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 15
      responses:
        "200":
          description: "Liste des notifications"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Notification"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /notifications/stream:
    get:
      tags: ["Notifications"]
      summary: "Flux Server-Sent Events"
      description: "Flux SSE pour les notifications en temps réel."
      operationId: notificationStream
      responses:
        "200":
          description: "Flux SSE de notifications"
          content:
            text/event-stream:
              schema:
                type: string

  /notifications/{id}/read:
    put:
      tags: ["Notifications"]
      summary: "Marquer une notification comme lue"
      operationId: markNotificationRead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: "Notification marquée comme lue"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "NOTIFICATION_MARKED_READ"

  /notifications/read-all:
    put:
      tags: ["Notifications"]
      summary: "Marquer toutes les notifications comme lues"
      operationId: markAllNotificationsRead
      responses:
        "200":
          description: "Toutes les notifications marquées comme lues"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "ALL_NOTIFICATIONS_MARKED_READ"

  /notifications/count:
    get:
      tags: ["Notifications"]
      summary: "Nombre de notifications non lues"
      description: "Retourne le nombre de notifications non lues (badge cloche)."
      operationId: notificationCount
      responses:
        "200":
          description: "Nombre de non lues"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      unread_count:
                        type: integer
                        example: 3

  # ============================================================
  # PROFIL
  # ============================================================
  /profile:
    get:
      tags: ["Profile"]
      summary: "Profil de l'utilisateur"
      description: "Retourne le profil complet de l'utilisateur connecté."
      operationId: getProfile
      responses:
        "200":
          description: "Profil utilisateur"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CurrentUser"

    put:
      tags: ["Profile"]
      summary: "Modifier le profil"
      description: "Met à jour les informations du profil (champs partiels acceptés)."
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                phone:
                  type: string
                personal_email:
                  type: string
                address:
                  type: string
                date_of_birth:
                  type: string
                  format: date
      responses:
        "200":
          description: "Profil mis à jour"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CurrentUser"

  /profile/photo:
    post:
      tags: ["Profile"]
      summary: "Uploader une photo de profil"
      operationId: uploadProfilePhoto
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: ["photo"]
              properties:
                photo:
                  type: string
                  format: binary
                  description: "Image (JPG, PNG, max 2 Mo)"
      responses:
        "200":
          description: "Photo mise à jour"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      photo_url:
                        type: string
                        format: uri

  # ============================================================
  # PARAMÈTRES ENTREPRISE
  # ============================================================
  /settings:
    get:
      tags: ["Settings"]
      summary: "Paramètres de l'entreprise"
      description: "Retourne tous les paramètres de configuration de l'entreprise."
      operationId: getSettings
      responses:
        "200":
          description: "Paramètres"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CompanySettings"

    put:
      tags: ["Settings"]
      summary: "Modifier les paramètres"
      description: "Met à jour les paramètres de l'entreprise (champs partiels acceptés)."
      operationId: updateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanySettingsUpdate"
      responses:
        "200":
          description: "Paramètres mis à jour"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CompanySettings"

  /settings/hr-models:
    get:
      tags: ["Settings"]
      summary: "Modèles RH disponibles"
      description: "Retourne la liste des modèles RH par pays (cotisations, IR, congés)."
      operationId: listHrModels
      responses:
        "200":
          description: "Modèles RH"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/HrModel"

  /settings/apply-hr-model:
    put:
      tags: ["Settings"]
      summary: "Appliquer un modèle RH"
      description: "Change le modèle RH de l'entreprise et met à jour les paramètres de paie."
      operationId: applyHrModel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["hr_model"]
              properties:
                hr_model:
                  type: string
                  example: "morocco"
      responses:
        "200":
          description: "Modèle appliqué"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "HR_MODEL_APPLIED"
                  data:
                    type: object
                    properties:
                      hr_model:
                        type: string
                        example: "morocco"
                      currency:
                        type: string
                        example: "MAD"

  # ============================================================
  # ÉVALUATIONS
  # ============================================================
  /evaluations:
    get:
      tags: ["Evaluations"]
      summary: "Lister les évaluations"
      parameters:
        - name: employee_id
          in: query
          schema:
            type: integer
        - name: period
          in: query
          schema:
            type: string
            example: "2026-Q1"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: "Liste des évaluations"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        employee:
                          $ref: "#/components/schemas/EmployeeRef"
                        period:
                          type: string
                        overall_score:
                          type: number
                          format: double
                        status:
                          type: string
                        self_eval_done:
                          type: boolean
                        evaluated_by:
                          $ref: "#/components/schemas/EmployeeRef"
                        created_at:
                          type: string
                          format: date-time

    post:
      tags: ["Evaluations"]
      summary: "Créer une évaluation"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["employee_id", "period", "criteria"]
              properties:
                employee_id:
                  type: integer
                period:
                  type: string
                  example: "2026-Q2"
                criteria:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      score:
                        type: integer
                        minimum: 1
                        maximum: 5
                      comment:
                        type: string
                global_comment:
                  type: string
      responses:
        "201":
          description: "Évaluation créée"

  /evaluations/{id}/self:
    put:
      tags: ["Evaluations"]
      summary: "Auto-évaluation"
      description: "Permet à l'employé de remplir sa propre évaluation."
      operationId: selfEvaluation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["criteria"]
              properties:
                criteria:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      score:
                        type: integer
                      comment:
                        type: string
                global_comment:
                  type: string
      responses:
        "200":
          description: "Auto-évaluation enregistrée"

  # ============================================================
  # RAPPORTS
  # ============================================================
  /reports/attendance:
    get:
      tags: ["Reports"]
      summary: "Rapport de pointage"
      parameters:
        - name: month
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
        - name: department_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: "Rapport de présence"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      period:
                        type: string
                      department:
                        type: string
                      summary:
                        type: object
                        properties:
                          total_employees:
                            type: integer
                          total_working_days:
                            type: integer
                          average_punctuality_rate:
                            type: number
                          total_late_occurrences:
                            type: integer
                          total_absences_days:
                            type: integer

  /reports/absences:
    get:
      tags: ["Reports"]
      summary: "Rapport d'absences"
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: department_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: "Rapport d'absences"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      period:
                        type: string
                      summary:
                        type: object
                        properties:
                          total_absence_days:
                            type: integer
                          by_type:
                            type: array
                            items:
                              type: object
                              properties:
                                type:
                                  type: string
                                days:
                                  type: integer
                                percentage:
                                  type: number

  /reports/payroll:
    get:
      tags: ["Reports"]
      summary: "Rapport de paie"
      parameters:
        - name: month
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: "Rapport de paie"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      period:
                        type: string
                      summary:
                        type: object
                        properties:
                          total_gross:
                            type: number
                          total_net:
                            type: number
                          total_social_security:
                            type: number
                          total_income_tax:
                            type: number
                          total_advance_deductions:
                            type: number
                          employees_count:
                            type: integer

  /reports/performance:
    get:
      tags: ["Reports"]
      summary: "Rapport de performance"
      parameters:
        - name: period
          in: query
          schema:
            type: string
        - name: department_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: "Rapport de performance"

  # ============================================================
  # SUPER ADMIN
  # ============================================================
  /admin/companies:
    get:
      tags: ["SuperAdmin"]
      summary: "Lister les entreprises"
      description: "Retourne la liste des entreprises de la plateforme (Super Admin uniquement)."
      operationId: adminListCompanies
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: ["active", "trial", "suspended", "expired"]
        - name: plan
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: "Liste des entreprises"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminCompany"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      tags: ["SuperAdmin"]
      summary: "Créer une entreprise"
      description: "Crée une entreprise avec son schéma tenant et son administrateur."
      operationId: adminCreateCompany
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateCompanyRequest"
      responses:
        "201":
          description: "Entreprise créée"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AdminCompany"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: "Données invalides"

  /admin/companies/{id}:
    get:
      tags: ["SuperAdmin"]
      summary: "Détails d'une entreprise"
      operationId: adminGetCompany
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Détails de l'entreprise"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AdminCompany"

    put:
      tags: ["SuperAdmin"]
      summary: "Modifier une entreprise"
      operationId: adminUpdateCompany
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                plan_id:
                  type: integer
                status:
                  type: string
                  enum: ["active", "trial", "suspended", "expired"]
      responses:
        "200":
          description: "Entreprise mise à jour"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AdminCompany"

  /admin/companies/{id}/suspend:
    put:
      tags: ["SuperAdmin"]
      summary: "Suspendre une entreprise"
      operationId: adminSuspendCompany
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["reason"]
              properties:
                reason:
                  type: string
                  example: "Impayé depuis 60 jours"
      responses:
        "200":
          description: "Entreprise suspendue"

  /admin/plans:
    get:
      tags: ["SuperAdmin", "Billing"]
      summary: "Lister les plans tarifaires"
      operationId: adminListPlans
      responses:
        "200":
          description: "Liste des plans"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Plan"

    post:
      tags: ["SuperAdmin", "Billing"]
      summary: "Créer un plan tarifaire"
      operationId: adminCreatePlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanRequest"
      responses:
        "201":
          description: "Plan créé"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Plan"

  /admin/invoices:
    get:
      tags: ["SuperAdmin", "Billing"]
      summary: "Lister les factures"
      operationId: adminListInvoices
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: ["draft", "sent", "paid", "overdue", "cancelled"]
        - name: company_id
          in: query
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: "Liste des factures"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Invoice"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /admin/languages:
    get:
      tags: ["SuperAdmin"]
      summary: "Lister les langues"
      operationId: adminListLanguages
      responses:
        "200":
          description: "Langues disponibles"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Language"

    put:
      tags: ["SuperAdmin"]
      summary: "Modifier une langue"
      operationId: adminUpdateLanguage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: ["code"]
              properties:
                code:
                  type: string
                  example: "ar"
                name:
                  type: string
                is_active:
                  type: boolean
      responses:
        "200":
          description: "Langue mise à jour"

  /admin/hr-models:
    get:
      tags: ["SuperAdmin", "Settings"]
      summary: "Modèles RH (Super Admin)"
      description: "Retourne les modèles RH templates par pays avec cotisations et IR."
      operationId: adminListHrModels
      responses:
        "200":
          description: "Modèles RH disponibles"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        country_code:
                          type: string
                          example: "DZ"
                        name:
                          type: string
                          example: "Algérie"
                        currency:
                          type: string
                          example: "DZD"
                        cotisations:
                          type: object
                        ir_brackets:
                          type: array
                        leave_rules:
                          type: object

# ============================================================
# COMPONENTS
# ============================================================
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "Token Sanctum Laravel obtenu via POST /auth/login"

  parameters:
    EmployeeId:
      name: id
      in: path
      required: true
      description: "Identifiant de l'employé"
      schema:
        type: integer

    AbsenceId:
      name: id
      in: path
      required: true
      description: "Identifiant de l'absence"
      schema:
        type: integer

  responses:
    Unauthorized:
      description: "Non authentifié — token manquant, invalide ou expiré"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "UNAUTHENTICATED"
            message: "Token invalide ou expiré."

    Forbidden:
      description: "Accès refusé — permissions insuffisantes"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "FORBIDDEN"
            message: "Vous n'avez pas les permissions nécessaires."

    NotFound:
      description: "Ressource introuvable"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "NOT_FOUND"
            message: "Ressource introuvable."

  schemas:
    # ----------------------------------------------------------
    # Réponses génériques
    # ----------------------------------------------------------
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: "Code d'erreur technique"
          example: "INVALID_CREDENTIALS"
        message:
          type: string
          description: "Message lisible de l'erreur"
          example: "Email ou mot de passe incorrect."
        errors:
          type: object
          description: "Détails par champ (erreurs de validation)"
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email: ["L'email est déjà utilisé."]

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Les données fournies sont invalides."
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email:
              - "Le champ email est requis."
            password:
              - "Le mot de passe doit contenir au moins 8 caractères."

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        last_page:
          type: integer
          example: 5
        per_page:
          type: integer
          example: 15
        total:
          type: integer
          example: 74

    # ----------------------------------------------------------
    # Auth
    # ----------------------------------------------------------
    LoginRequest:
      type: object
      required: ["email", "password"]
      properties:
        email:
          type: string
          format: email
          example: "ahmed.benali@entreprise.com"
        password:
          type: string
          format: password
          example: "MonMotDePasse123!"
        device_name:
          type: string
          description: "Nom de l'appareil pour l'historique"
          example: "iPhone 15 Pro"
        fcm_token:
          type: string
          description: "Token Firebase Cloud Messaging pour les push"
          example: "fcm_abc123..."

    LoginResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            token:
              type: string
              example: "1|AbCdEfGhIjKlMnOpQrStUvWxYz"
            token_type:
              type: string
              example: "Bearer"
            expires_at:
              type: string
              format: date-time
              example: "2026-07-15T10:00:00Z"
            user:
              $ref: "#/components/schemas/LoginUser"

    LoginUser:
      type: object
      properties:
        id:
          type: integer
          example: 42
        first_name:
          type: string
          example: "Ahmed"
        last_name:
          type: string
          example: "Benali"
        email:
          type: string
          format: email
        role:
          type: string
          enum: ["manager", "employee"]
        manager_role:
          type: string
          nullable: true
          enum: ["principal", "rh", "dept", "comptable", "superviseur", null]
        photo_url:
          type: string
          format: uri
          nullable: true
        leave_balance:
          type: number
          format: double
          example: 12.5
        company:
          $ref: "#/components/schemas/CompanyRef"

    FcmDeviceRequest:
      type: object
      required: ["fcm_token", "device_name", "platform"]
      properties:
        fcm_token:
          type: string
        device_name:
          type: string
          example: "iPhone 15 Pro"
        platform:
          type: string
          enum: ["android", "ios"]

    # ----------------------------------------------------------
    # Onboarding
    # ----------------------------------------------------------
    RegisterRequest:
      type: object
      required: ["company_name", "manager_email", "manager_password", "country", "estimated_employees"]
      properties:
        company_name:
          type: string
          minLength: 2
          maxLength: 100
          example: "Entreprise SARL"
        manager_email:
          type: string
          format: email
          example: "contact@entreprise.com"
        manager_password:
          type: string
          minLength: 8
          description: "Min 8 caractères, 1 majuscule, 1 chiffre"
          example: "MotDePasse123!"
        country:
          type: string
          description: "Code ISO 3166-1 alpha-2"
          pattern: "^[A-Z]{2}$"
          example: "DZ"
        estimated_employees:
          type: integer
          minimum: 1
          example: 15
        plan:
          type: string
          enum: ["starter", "business"]
          default: "starter"

    RegisterResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            company:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                slug:
                  type: string
                status:
                  type: string
                  enum: ["trial"]
                trial_ends_at:
                  type: string
                  format: date
                plan:
                  type: string
            token:
              type: string
            user:
              type: object
              properties:
                id:
                  type: integer
                email:
                  type: string
                role:
                  type: string
                manager_role:
                  type: string

    # ----------------------------------------------------------
    # Company
    # ----------------------------------------------------------
    CompanyRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "TechCorp SPA"
        language:
          type: string
          example: "fr"
        timezone:
          type: string
          example: "Africa/Algiers"
        currency:
          type: string
          example: "DZD"
        logo_url:
          type: string
          format: uri
          nullable: true

    # ----------------------------------------------------------
    # Employee
    # ----------------------------------------------------------
    EmployeeRef:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "Ahmed Benali"
        photo_url:
          type: string
          format: uri
          nullable: true

    EmployeeSummary:
      type: object
      properties:
        id:
          type: integer
          example: 42
        matricule:
          type: string
          example: "EMP-0042"
        first_name:
          type: string
          example: "Ahmed"
        last_name:
          type: string
          example: "Benali"
        email:
          type: string
          format: email
        role:
          type: string
          enum: ["manager", "employee"]
        department:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
              example: "Développement"
        position:
          type: object
