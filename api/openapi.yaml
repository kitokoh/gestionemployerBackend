        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        role:
          type: string
          enum: ["manager", "employee"]
        manager_role:
          type: string
          nullable: true
          enum: ["principal", "rh", "dept", "comptable", "superviseur"]
        department:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        position:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        schedule:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
              example: "Standard 8h-17h"
        site:
