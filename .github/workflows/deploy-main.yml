name: Deploy - Leopardo RH

on:
  workflow_run:
    workflows: ["Tests - Leopardo RH"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEFAULT_API_BASE_URL: https://gestionemployerbackend.onrender.com/api/v1
  DEFAULT_API_HEALTHCHECK_URL: https://gestionemployerbackend.onrender.com/api/v1/health

concurrency:
  group: deploy-main-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare deployment context
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.context.outputs.should_deploy }}
      ref: ${{ steps.context.outputs.ref }}
      sha: ${{ steps.context.outputs.sha }}
    steps:
      - name: Resolve deployment source
        id: context
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
              echo "should_deploy=false" >> "$GITHUB_OUTPUT"
              echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
              echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event.workflow_run.conclusion }}" == "success" && "${{ github.event.workflow_run.event }}" == "push" && "${{ github.event.workflow_run.head_branch }}" == "main" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "ref=main" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "ref=" >> "$GITHUB_OUTPUT"
            echo "sha=" >> "$GITHUB_OUTPUT"
          fi

  deploy-api:
    name: Deploy API + Web to Render
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_deploy == 'true'

    steps:
      - name: Validate Render secret
        shell: bash
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${RENDER_DEPLOY_HOOK_URL}" ]]; then
            echo "Missing GitHub secret: RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi

      - name: Trigger Render deploy hook
        shell: bash
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --request POST "${RENDER_DEPLOY_HOOK_URL}"

      - name: Wait for API/Web healthcheck
        shell: bash
        env:
          API_HEALTHCHECK_URL: ${{ secrets.API_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          URL="${API_HEALTHCHECK_URL:-${DEFAULT_API_HEALTHCHECK_URL}}"

          for attempt in {1..30}; do
            echo "Healthcheck attempt ${attempt}/30 on ${URL}"
            if curl --fail --silent --show-error "${URL}" | grep -q '"status":"ok"'; then
              echo "Render deployment healthy."
              exit 0
            fi
            sleep 20
          done

          echo "API healthcheck did not become healthy in time."
          exit 1

  distribute-mobile:
    name: Distribute mobile staging build
    runs-on: ubuntu-latest
    needs: [prepare, deploy-api]
    if: needs.prepare.outputs.should_deploy == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Validate Firebase secrets
        shell: bash
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${FIREBASE_APP_ID}" ]]; then
            echo "Missing GitHub secret: FIREBASE_APP_ID"
            exit 1
          fi
          if [[ -z "${FIREBASE_TOKEN}" ]]; then
            echo "Missing GitHub secret: FIREBASE_TOKEN"
            exit 1
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Place google-services.json if provided in repo
        shell: bash
        run: |
          set -euo pipefail
          ROOT_FILE="google-services.json"
          API_FILE="api/google-services.json"
          APP_FILE="mobile/android/app/google-services.json"
          if [[ -f "$ROOT_FILE" && ! -f "$APP_FILE" ]]; then
            cp "$ROOT_FILE" "$APP_FILE"
          elif [[ -f "$API_FILE" && ! -f "$APP_FILE" ]]; then
            cp "$API_FILE" "$APP_FILE"
          fi

      - name: Flutter pub get
        working-directory: ./mobile
        run: flutter pub get

      - name: Build release APK for staging
        working-directory: ./mobile
        shell: bash
        run: |
          set -euo pipefail
          echo "API_BASE_URL=${DEFAULT_API_BASE_URL}" > .env.build
          flutter build apk --release \
            --dart-define-from-file=.env.build \
            --build-name="main-${GITHUB_RUN_NUMBER}" \
            --build-number="${GITHUB_RUN_NUMBER}"

      - name: Upload mobile artifact
        uses: actions/upload-artifact@v5
        with:
          name: leopardo-rh-main-${{ github.run_number }}
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Firebase App Distribution (staging)
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testeurs-internes
          file: mobile/build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            Auto deploy from main
            Commit: ${{ needs.prepare.outputs.sha }}
            Workflow: ${{ github.workflow }}
            Backend: https://gestionemployerbackend.onrender.com
