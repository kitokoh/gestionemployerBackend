name: CodeQL - Leopardo RH

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"

permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (Backend)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || vars.ENABLE_CODEQL_PR == 'true'

    strategy:
      fail-fast: false
      matrix:
        language: [actions]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
