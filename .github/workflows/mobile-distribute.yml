name: 📱 Mobile — Build & Firebase Distribution

on:
  # ── Déclenché par un TAG Git ────────────────────────────────────────────────
  # Staging : git tag v1.0-staging  && git push origin v1.0-staging
  # Prod    : git tag v1.0-prod     && git push origin v1.0-prod
  push:
    tags:
      - 'v*-staging'   # ex: v1.0-staging, v1.2-staging
      - 'v*-prod'      # ex: v1.0-prod

  # ── Ou lancé manuellement depuis GitHub Actions ──────────────────────────
  workflow_dispatch:
    inputs:
      environment:
        description: 'Cible de déploiement'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod
      release_notes:
        description: 'Notes de version (optionnel)'
        required: false
        default: 'Build manuel Leopardo RH'

jobs:
  build-and-distribute:
    name: Build APK Staging → Firebase App Distribution
    runs-on: ubuntu-latest

    steps:
      # ── 1. Récupérer le code ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Configurer Java (requis pour Gradle/Android) ─────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Configurer Flutter ───────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 4. Installer les dépendances ────────────────────────────────────────
      - name: Install Flutter dependencies
        working-directory: ./mobile
        run: flutter pub get

      # ── 5. Analyser le code ─────────────────────────────────────────────────
      - name: Analyze Flutter code
        working-directory: ./mobile
        run: flutter analyze --no-fatal-infos

      # ── 6. Détecter l'environnement (depuis le tag ou l'input manuel) ────────
      - name: Detect environment
        id: env_detect
        run: |
          TAG="${{ github.ref_name }}"
          INPUT_ENV="${{ github.event.inputs.environment }}"
          
          if [[ "$TAG" == *"-prod" ]]; then
            echo "TARGET=prod" >> $GITHUB_ENV
            echo "BUILD_NAME=${TAG//-prod/}" >> $GITHUB_ENV
          elif [[ "$TAG" == *"-staging" ]]; then
            echo "TARGET=staging" >> $GITHUB_ENV
            echo "BUILD_NAME=${TAG//-staging/}" >> $GITHUB_ENV
          elif [[ "$INPUT_ENV" == "prod" ]]; then
            echo "TARGET=prod" >> $GITHUB_ENV
            echo "BUILD_NAME=manual-$(date +%Y%m%d)" >> $GITHUB_ENV
          else
            echo "TARGET=staging" >> $GITHUB_ENV
            echo "BUILD_NAME=manual-$(date +%Y%m%d)" >> $GITHUB_ENV
          fi
          echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV

      # ── 7. Créer le fichier .env dynamiquement selon l'environnement ──────────
      - name: Create .env file
        working-directory: ./mobile
        run: |
          if [ "$TARGET" = "prod" ]; then
            echo "API_BASE_URL=https://api.leopardo-rh.com/api/v1" > .env.build
          else
            echo "API_BASE_URL=https://gestionemployerbackend.onrender.com/api/v1" > .env.build
          fi

      # ── 8. Compiler l'APK ou l'AAB selon l'environnement ──────────────────────
      - name: Build Flutter app
        working-directory: ./mobile
        run: |
          if [ "$TARGET" = "prod" ]; then
            flutter build appbundle --release \
              --dart-define-from-file=.env.build \
              --build-name=${{ env.BUILD_NAME }} \
              --build-number=${{ env.BUILD_NUMBER }}
          else
            flutter build apk --release \
              --dart-define-from-file=.env.build \
              --build-name=${{ env.BUILD_NAME }} \
              --build-number=${{ env.BUILD_NUMBER }}
          fi

      # ── 9. Uploader l'artefact GitHub ───────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: leopardo-rh-${{ env.TARGET }}-${{ env.BUILD_NAME }}
          path: |
            mobile/build/app/outputs/flutter-apk/app-release.apk
            mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── 10. Firebase App Distribution (staging uniquement) ─────────────────
      - name: Firebase App Distribution
        if: env.TARGET == 'staging'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testeurs-internes
          file: mobile/build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            🐆 Leopardo RH ${{ env.BUILD_NAME }}
            Tag: ${{ github.ref_name }}
            ${{ github.event.inputs.release_notes }}
            Backend: https://gestionemployerbackend.onrender.com
