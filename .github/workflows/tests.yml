name: Tests - Leopardo RH

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  backend-tests:
    name: Backend (PHP 8.3 + PostgreSQL 16 + Redis 7)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: leopardo_test
          POSTGRES_USER: leopardo_user
          POSTGRES_PASSWORD: leopardo_pass_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, redis, bcmath, mbstring, xml, zip
          coverage: xdebug

      - name: Install Composer dependencies
        working-directory: ./api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare test environment
        working-directory: ./api
        run: |
          cp .env.example .env.testing
          echo "APP_ENV=testing" >> .env.testing
          echo "APP_KEY=" >> .env.testing
          echo "DB_CONNECTION=pgsql" >> .env.testing
          echo "DB_HOST=127.0.0.1" >> .env.testing
          echo "DB_PORT=5432" >> .env.testing
          echo "DB_DATABASE=leopardo_test" >> .env.testing
          echo "DB_USERNAME=leopardo_user" >> .env.testing
          echo "DB_PASSWORD=leopardo_pass_test" >> .env.testing
          echo "REDIS_HOST=127.0.0.1" >> .env.testing
          echo "CACHE_DRIVER=redis" >> .env.testing
          echo "QUEUE_CONNECTION=sync" >> .env.testing

      - name: Generate key
        working-directory: ./api
        run: php artisan key:generate --env=testing

      - name: Run migrations
        working-directory: ./api
        run: php artisan migrate --env=testing --force

      - name: Seed database
        working-directory: ./api
        run: php artisan db:seed --env=testing --force

      - name: Run backend tests
        working-directory: ./api
        run: php artisan test --parallel --coverage-text --min=70

  mobile-tests:
    name: Mobile Flutter (stable)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: ./mobile
        run: flutter pub get

      - name: Analyze
        working-directory: ./mobile
        run: flutter analyze --no-fatal-infos

      - name: Run Flutter tests
        working-directory: ./mobile
        run: flutter test --coverage

  governance-gates:
    name: Governance Gates (changelog + canonical files)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate governance and changelog
        run: pwsh tools/check-governance.ps1 -BaseRef ${{ github.event.pull_request.base.sha }} -HeadRef ${{ github.event.pull_request.head.sha }}

  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs: [backend-tests, mobile-tests, governance-gates]
    if: always()

    steps:
      - name: All tests passed
        if: needs.backend-tests.result == 'success' && needs.mobile-tests.result == 'success' && (needs.governance-gates.result == 'success' || needs.governance-gates.result == 'skipped')
        run: echo "All checks passed - PR can be merged"

      - name: Checks failed
        if: needs.backend-tests.result == 'failure' || needs.mobile-tests.result == 'failure' || needs.governance-gates.result == 'failure'
        run: |
          echo "Checks failed - merge blocked"
          exit 1
