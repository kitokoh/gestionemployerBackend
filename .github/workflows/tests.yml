name: Tests - Leopardo RH

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  backend-tests:
    name: Backend (PHP 8.3 + PostgreSQL 16 + Redis 7)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: leopardo_test
          POSTGRES_USER: leopardo_user
          POSTGRES_PASSWORD: leopardo_pass_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, pdo_sqlite, sqlite3, redis, bcmath, mbstring, xml, zip, gd
          coverage: xdebug

      - name: Prepare environment
        working-directory: ./api
        run: |
          cat > .env <<'EOF'
          APP_NAME=LeopardoRH
          APP_ENV=testing
          APP_KEY=base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          APP_DEBUG=true
          APP_URL=http://localhost

          DB_CONNECTION=sqlite
          DB_DATABASE=:memory:

          CACHE_STORE=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          EOF

      - name: Install Composer dependencies
        working-directory: ./api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run backend tests
        working-directory: ./api
        run: php artisan test

  mobile-tests:
    name: Mobile Flutter (Stable Channel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect mobile workspace
        id: mobile
        run: |
          if [ -f "mobile/pubspec.yaml" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Flutter
        if: steps.mobile.outputs.exists == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.mobile.outputs.exists == 'true'
        working-directory: ./mobile
        run: flutter pub get

      - name: Analyze
        if: steps.mobile.outputs.exists == 'true'
        working-directory: ./mobile
        run: flutter analyze --no-fatal-infos

      - name: Run Flutter tests
        if: steps.mobile.outputs.exists == 'true'
        working-directory: ./mobile
        run: flutter test --coverage

      - name: Skip mobile checks (no mobile/ directory)
        if: steps.mobile.outputs.exists != 'true'
        run: echo "Mobile workspace not present in this branch; skipping."

  governance-gates:
    name: Governance Gates (changelog + canonical files)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate governance and changelog
        run: pwsh tools/check-governance.ps1 -BaseRef ${{ github.event.pull_request.base.sha }} -HeadRef ${{ github.event.pull_request.head.sha }}

  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs: [backend-tests, mobile-tests, governance-gates]
    if: always()

    steps:
      - name: All tests passed
        if: needs.backend-tests.result == 'success' && needs.mobile-tests.result == 'success' && (needs.governance-gates.result == 'success' || needs.governance-gates.result == 'skipped')
        run: echo "All checks passed - PR can be merged"

      - name: Checks failed
        if: needs.backend-tests.result == 'failure' || needs.mobile-tests.result == 'failure' || needs.governance-gates.result == 'failure'
        run: |
          echo "Checks failed - merge blocked"
          exit 1
