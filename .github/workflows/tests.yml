name: Tests — Leopardo RH

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Backend Laravel 11 Tests
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend (PHP 8.3 + PostgreSQL 16 + Redis 7)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: leopardo_test
          POSTGRES_USER: leopardo_user
          POSTGRES_PASSWORD: leopardo_pass_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, redis, bcmath, mbstring, xml, zip
          coverage: xdebug

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        working-directory: ./api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env.testing
        working-directory: ./api
        run: cp .env.example .env.testing

      - name: Set test environment variables
        working-directory: ./api
        run: |
          echo "APP_ENV=testing" >> .env.testing
          echo "APP_KEY=" >> .env.testing
          echo "DB_CONNECTION=pgsql" >> .env.testing
          echo "DB_HOST=127.0.0.1" >> .env.testing
          echo "DB_PORT=5432" >> .env.testing
          echo "DB_DATABASE=leopardo_test" >> .env.testing
          echo "DB_USERNAME=leopardo_user" >> .env.testing
          echo "DB_PASSWORD=leopardo_pass_test" >> .env.testing
          echo "REDIS_HOST=127.0.0.1" >> .env.testing
          echo "CACHE_DRIVER=redis" >> .env.testing
          echo "QUEUE_CONNECTION=sync" >> .env.testing

      - name: Generate application key
        working-directory: ./api
        run: php artisan key:generate --env=testing

      - name: Run database migrations
        working-directory: ./api
        run: php artisan migrate --env=testing --force

      - name: Run database seeders (test data)
        working-directory: ./api
        run: php artisan db:seed --env=testing --force

      - name: Run Pest tests (parallel)
        working-directory: ./api
        run: php artisan test --parallel --coverage-text --min=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: api/coverage/

  # ─────────────────────────────────────────────
  # JOB 2 — Flutter Mobile Tests
  # ─────────────────────────────────────────────
  mobile-tests:
    name: Mobile Flutter (Stable Channel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: ./mobile
        run: flutter pub get

      - name: Verify Flutter setup
        working-directory: ./mobile
        run: flutter doctor -v

      - name: Run Flutter analyzer (lint)
        working-directory: ./mobile
        run: flutter analyze --no-fatal-infos

      - name: Run Flutter tests
        working-directory: ./mobile
        run: flutter test --coverage

      - name: Upload Flutter coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: mobile/coverage/

  # ─────────────────────────────────────────────
  # JOB 3 — Notification de résultat
  # ─────────────────────────────────────────────
  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs: [backend-tests, mobile-tests]
    if: always()

    steps:
      - name: All tests passed
        if: needs.backend-tests.result == 'success' && needs.mobile-tests.result == 'success'
        run: echo "✅ All tests passed — PR can be merged"

      - name: Tests failed
        if: needs.backend-tests.result == 'failure' || needs.mobile-tests.result == 'failure'
        run: |
          echo "❌ Tests failed — merge blocked"
          exit 1
