name: Tests - Leopardo RH

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend (PHP 8.4 + PostgreSQL 16 + Redis 7)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: leopardo_test
          POSTGRES_USER: leopardo_user
          POSTGRES_PASSWORD: leopardo_pass_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, pdo_sqlite, sqlite3, redis, bcmath, mbstring, xml, zip, gd
          coverage: none

      - name: Validate composer.json
        working-directory: ./api
        run: composer validate --no-check-publish --strict

      - name: Prepare environment
        working-directory: ./api
        run: |
          cat > .env <<'EOF'
          APP_NAME=LeopardoRH
          APP_ENV=testing
          APP_KEY=base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          APP_DEBUG=true
          APP_URL=http://localhost

          DB_CONNECTION=pgsql
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_DATABASE=leopardo_test
          DB_USERNAME=leopardo_user
          DB_PASSWORD=leopardo_pass_test
          DB_SEARCH_PATH=shared_tenants,public

          CACHE_STORE=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          EOF

      - name: Install Composer dependencies
        working-directory: ./api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run migrations
        working-directory: ./api
        run: php artisan migrate --force

      - name: Run backend tests
        working-directory: ./api
        run: php artisan test

  backend-security:
    name: Backend Security (Composer Audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Run Composer audit
        working-directory: ./api
        run: composer audit --locked --no-dev

  mobile-tests:
    name: Mobile Flutter (Stable Channel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Detect mobile workspace
        id: mobile
        run: |
          if [ -f "mobile/pubspec.yaml" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java 17
        if: steps.mobile.outputs.exists == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        if: steps.mobile.outputs.exists == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.mobile.outputs.exists == 'true'
        working-directory: ./mobile
        run: flutter pub get

      - name: Place google-services.json if provided in repo
        if: steps.mobile.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          ROOT_FILE="google-services.json"
          API_FILE="api/google-services.json"
          APP_FILE="mobile/android/app/google-services.json"
          if [[ -f "$ROOT_FILE" && ! -f "$APP_FILE" ]]; then
            cp "$ROOT_FILE" "$APP_FILE"
          elif [[ -f "$API_FILE" && ! -f "$APP_FILE" ]]; then
            cp "$API_FILE" "$APP_FILE"
          fi

      - name: Check formatting
        if: steps.mobile.outputs.exists == 'true'
        working-directory: ./mobile
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        if: steps.mobile.outputs.exists == 'true'
        working-directory: ./mobile
        run: flutter analyze --fatal-infos

      - name: Run Flutter tests
        if: steps.mobile.outputs.exists == 'true'
        working-directory: ./mobile
        run: flutter test --coverage

      - name: Build Android smoke artifact
        if: steps.mobile.outputs.exists == 'true'
        working-directory: ./mobile
        run: flutter build apk --debug --dart-define=API_BASE_URL=https://gestionemployerbackend.onrender.com/api/v1

      - name: Skip mobile checks (no mobile/ directory)
        if: steps.mobile.outputs.exists != 'true'
        run: echo "Mobile workspace not present in this branch; skipping."

  governance-gates:
    name: Governance Gates (changelog + canonical files)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate governance and changelog
        run: pwsh tools/check-governance.ps1 -BaseRef ${{ github.event.pull_request.base.sha }} -HeadRef ${{ github.event.pull_request.head.sha }}

  dependency-review:
    name: Dependency Review (PR Security)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - backend-security
      - mobile-tests
      - governance-gates
      - dependency-review
    if: always()

    steps:
      - name: All checks passed
        if: |
          needs.backend-tests.result == 'success' &&
          needs.backend-security.result == 'success' &&
          needs.mobile-tests.result == 'success' &&
          (needs.governance-gates.result == 'success' || needs.governance-gates.result == 'skipped') &&
          (needs.dependency-review.result == 'success' || needs.dependency-review.result == 'skipped')
        run: echo "All checks passed - PR can be merged or main can be deployed"

      - name: Checks failed
        if: |
          contains(fromJson('["failure","cancelled","timed_out"]'), needs.backend-tests.result) ||
          contains(fromJson('["failure","cancelled","timed_out"]'), needs.backend-security.result) ||
          contains(fromJson('["failure","cancelled","timed_out"]'), needs.mobile-tests.result) ||
          contains(fromJson('["failure","cancelled","timed_out"]'), needs.governance-gates.result) ||
          contains(fromJson('["failure","cancelled","timed_out"]'), needs.dependency-review.result)
        run: |
          echo "Checks failed - merge or deployment blocked"
          exit 1
