name: Tests - Leopardo RH

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend (PHP 8.4 + PostgreSQL 16 + Redis 7)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: leopardo_test
          POSTGRES_USER: leopardo_user
          POSTGRES_PASSWORD: leopardo_pass_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, pdo_sqlite, sqlite3, redis, bcmath, mbstring, xml, zip, gd
          coverage: none

      - name: Validate composer.json
        working-directory: ./api
        run: composer validate --no-check-publish --strict

      - name: Prepare environment
        working-directory: ./api
        run: |
          cat > .env <<'EOF'
          APP_NAME=LeopardoRH
          APP_ENV=testing
          APP_KEY=base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          APP_DEBUG=true
          APP_URL=http://localhost

          DB_CONNECTION=pgsql
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_DATABASE=leopardo_test
          DB_USERNAME=leopardo_user
          DB_PASSWORD=leopardo_pass_test
          DB_SEARCH_PATH=shared_tenants,public

          CACHE_STORE=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          EOF

      - name: Install Composer dependencies
        working-directory: ./api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Bootstrap migration repositories
        working-directory: ./api
        run: |
          php <<'PHP'
          <?php
          $dsn = 'pgsql:host=127.0.0.1;port=5432;dbname=leopardo_test';
          $pdo = new PDO($dsn, 'leopardo_user', 'leopardo_pass_test', [
              PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION,
          ]);

          $pdo->exec(<<<'SQL'
          CREATE SCHEMA IF NOT EXISTS shared_tenants;
          CREATE TABLE IF NOT EXISTS public.migrations (
              id serial PRIMARY KEY,
              migration varchar(255) NOT NULL,
              batch integer NOT NULL
          );
          CREATE TABLE IF NOT EXISTS shared_tenants.migrations (
              id serial PRIMARY KEY,
              migration varchar(255) NOT NULL,
              batch integer NOT NULL
          );
          SQL);

          echo "Migration repositories ensured for public/shared_tenants.\n";
          PHP

      - name: Run public migrations
        working-directory: ./api
        run: DB_SEARCH_PATH=public php artisan migrate --path=database/migrations/public --force --isolated

      - name: Run tenant migrations
        working-directory: ./api
        run: DB_SEARCH_PATH=shared_tenants php artisan migrate --path=database/migrations/tenant --force --isolated

      - name: Run Run Pint code styling check
        working-directory: ./api
        run: ./vendor/bin/pint --test

      - name: Run backend unit tests
        working-directory: ./api
        run: php artisan test --testsuite=Unit --log-junit=storage/test-results/unit.xml

      - name: Run backend feature tests
        working-directory: ./api
        run: php artisan test --testsuite=Feature --log-junit=storage/test-results/feature.xml

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            api/storage/test-results/*.xml
            api/storage/logs/*.log
          if-no-files-found: ignore

  backend-security:
    name: Backend Security (Composer Audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Run Composer audit
        working-directory: ./api
        run: composer audit --locked --no-dev

  mobile-tests:
    name: Mobile Flutter (Stable Channel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect mobile workspace and changes
        id: mobile
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "mobile/pubspec.yaml" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=false
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            git fetch --no-tags --prune --depth=1 origin "${BASE_REF}"
            if git diff --name-only "origin/${BASE_REF}...HEAD" | grep -q '^mobile/'; then
              CHANGED=true
            fi
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ -n "${BEFORE}" ] && [ "${BEFORE}" != "0000000000000000000000000000000000000000" ]; then
              if git diff --name-only "${BEFORE}" "${AFTER}" | grep -q '^mobile/'; then
                CHANGED=true
              fi
            else
              if git show --name-only --pretty="" "${AFTER}" | grep -q '^mobile/'; then
                CHANGED=true
              fi
            fi
          fi

          echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"
          echo "Mobile changed: ${CHANGED}"

      - name: Setup Java 17
        if: steps.mobile.outputs.exists == 'true' && steps.mobile.outputs.changed == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        if: steps.mobile.outputs.exists == 'true' && steps.mobile.outputs.changed == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.mobile.outputs.exists == 'true' && steps.mobile.outputs.changed == 'true'
        working-directory: ./mobile
        run: flutter pub get

      - name: Place google-services.json if provided in repo
        if: steps.mobile.outputs.exists == 'true' && steps.mobile.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          ROOT_FILE="google-services.json"
          API_FILE="api/google-services.json"
          APP_FILE="mobile/android/app/google-services.json"
          if [[ -f "$ROOT_FILE" && ! -f "$APP_FILE" ]]; then
            cp "$ROOT_FILE" "$APP_FILE"
          elif [[ -f "$API_FILE" && ! -f "$APP_FILE" ]]; then
            cp "$API_FILE" "$APP_FILE"
          fi

      - name: Check formatting
        if: steps.mobile.outputs.exists == 'true' && steps.mobile.outputs.changed == 'true'
        working-directory: ./mobile
        continue-on-error: true
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        if: steps.mobile.outputs.exists == 'true' && steps.mobile.outputs.changed == 'true'
        working-directory: ./mobile
        continue-on-error: true
        run: flutter analyze --fatal-infos

      - name: Run Flutter tests
        if: steps.mobile.outputs.exists == 'true' && steps.mobile.outputs.changed == 'true'
        working-directory: ./mobile
        run: flutter test --coverage

      - name: Build Android smoke artifact
        if: steps.mobile.outputs.exists == 'true' && steps.mobile.outputs.changed == 'true'
        working-directory: ./mobile
        run: flutter build apk --debug --dart-define=API_BASE_URL=https://gestionemployerbackend.onrender.com/api/v1

      - name: Upload mobile test artifacts
        if: always() && steps.mobile.outputs.exists == 'true' && steps.mobile.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-reports
          path: |
            mobile/coverage/lcov.info
            mobile/test/**/*
          if-no-files-found: ignore

      - name: Skip mobile checks (no mobile change)
        if: steps.mobile.outputs.exists != 'true' || steps.mobile.outputs.changed != 'true'
        run: echo "No mobile changes detected for this push/PR; mobile pipeline skipped."

  governance-gates:
    name: Governance Gates (changelog + canonical files)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate governance and changelog
        run: pwsh tools/check-governance.ps1 -BaseRef ${{ github.event.pull_request.base.sha }} -HeadRef ${{ github.event.pull_request.head.sha }}

  dependency-review:
    name: Dependency Review (PR Security)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        continue-on-error: true

  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - backend-security
      - mobile-tests
      - governance-gates
      - dependency-review
    if: always()
    env:
      CI_SMTP_SERVER: ${{ secrets.CI_SMTP_SERVER }}
      CI_SMTP_USERNAME: ${{ secrets.CI_SMTP_USERNAME }}
      CI_SMTP_PASSWORD: ${{ secrets.CI_SMTP_PASSWORD }}
      CI_REPORT_TO: ${{ vars.CI_REPORT_TO }}
      CI_REPORT_FROM: ${{ vars.CI_REPORT_FROM }}

    steps:
      - name: Build CI report
        id: report
        shell: bash
        run: |
          set -euo pipefail
          cat > ci-report.md <<EOF
          # CI Report — Leopardo RH

          - Workflow: ${{ github.workflow }}
          - Run ID: ${{ github.run_id }}
          - Run Number: ${{ github.run_number }}
          - Branch/Ref: ${{ github.ref }}
          - Commit: ${{ github.sha }}
          - Actor: ${{ github.actor }}
          - URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ## Job Results
          - Backend Tests: ${{ needs.backend-tests.result }}
          - Backend Security: ${{ needs.backend-security.result }}
          - Mobile Tests: ${{ needs.mobile-tests.result }}
          - Governance Gates: ${{ needs.governance-gates.result }}
          - Dependency Review: ${{ needs.dependency-review.result }}

          ## Scenario References
          - Backend API scenarios: docs/GESTION_PROJET/SCENARIOS_TEST_API_GITHUB_ACTIONS.md
          - Mobile Flutter scenarios: docs/GESTION_PROJET/SCENARIOS_TEST_MOBILE_FLUTTER.md

          ## Backend Coverage Intent
          - Unit: services et logique metier pure
          - Feature: auth, auth guardrails, RBAC, multitenant, attendance, estimation, health, contrats JSON mobile
          - Gaps prioritaires a fermer: register public, conges, payroll, blocked user dedie
          EOF

      - name: Upload CI report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-report
          path: ci-report.md
          if-no-files-found: error

      - name: Send CI report email (if SMTP configured)
        if: always() && env.CI_SMTP_SERVER != '' && env.CI_SMTP_USERNAME != '' && env.CI_SMTP_PASSWORD != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.CI_SMTP_SERVER }}
          server_port: 587
          username: ${{ env.CI_SMTP_USERNAME }}
          password: ${{ env.CI_SMTP_PASSWORD }}
          secure: false
          subject: "Leopardo RH CI Report — Run #${{ github.run_number }}"
          to: ${{ env.CI_REPORT_TO != '' && env.CI_REPORT_TO || 'nouractu.com@gmail.com' }}
          from: ${{ env.CI_REPORT_FROM != '' && env.CI_REPORT_FROM || env.CI_SMTP_USERNAME }}
          body: file://ci-report.md

      - name: All checks passed
        if: |
          needs.backend-tests.result == 'success' &&
          needs.backend-security.result == 'success' &&
          needs.mobile-tests.result == 'success' &&
          (needs.governance-gates.result == 'success' || needs.governance-gates.result == 'skipped') &&
          (needs.dependency-review.result == 'success' || needs.dependency-review.result == 'skipped')
        run: echo "All checks passed - PR can be merged or main can be deployed"

      - name: Checks failed
        if: |
          contains(fromJson('["failure","cancelled","timed_out"]'), needs.backend-tests.result) ||
          contains(fromJson('["failure","cancelled","timed_out"]'), needs.backend-security.result) ||
          contains(fromJson('["failure","cancelled","timed_out"]'), needs.mobile-tests.result) ||
          contains(fromJson('["failure","cancelled","timed_out"]'), needs.governance-gates.result) ||
          contains(fromJson('["failure","cancelled","timed_out"]'), needs.dependency-review.result)
        run: |
          echo "Checks failed - merge or deployment blocked"
          exit 1

