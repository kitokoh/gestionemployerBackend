name: Deploy — Leopardo RH → o2switch

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permet le déclenchement manuel depuis GitHub

env:
  DEPLOY_PATH: /var/www/leopardo-rh-api

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Vérification avant déploiement
  # ─────────────────────────────────────────────
  pre-deploy-check:
    name: Pre-deploy Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, redis, bcmath, mbstring, xml, zip

      - name: Install dependencies
        working-directory: ./api
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Check for syntax errors
        working-directory: ./api
        run: find app -name "*.php" -exec php -l {} \;

      - name: Verify .env.example is complete
        working-directory: ./api
        run: |
          if [ ! -f .env.example ]; then
            echo "❌ .env.example manquant!"
            exit 1
          fi
          echo "✅ .env.example présent"

  # ─────────────────────────────────────────────
  # JOB 2 — Déploiement SSH o2switch
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to o2switch VPS
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.O2SWITCH_HOST }}
          username: ${{ secrets.O2SWITCH_USER }}
          key: ${{ secrets.O2SWITCH_SSH_KEY }}
          port: ${{ secrets.O2SWITCH_PORT || 22 }}
          script: |
            set -e

            echo "📦 Démarrage déploiement Leopardo RH — $(date)"

            # Aller dans le dossier API
            cd ${{ env.DEPLOY_PATH }}

            # Activer le mode maintenance (évite les erreurs utilisateurs pendant le déploiement)
            php artisan down --render="errors::503" --retry=60

            # Pull du code depuis main
            git pull origin main

            # Installer les dépendances sans packages de dev
            composer install --no-dev --optimize-autoloader --no-interaction

            # ─── BACKUP BASE DE DONNÉES AVANT MIGRATION ───────────────────
            # OBLIGATOIRE — rollback manuel possible si migration échoue
            BACKUP_FILE="/var/backups/leopardo/leopardo_db_$(date +%Y%m%d_%H%M%S).dump"
            mkdir -p /var/backups/leopardo
            pg_dump -Fc -U leopardo_user leopardo_db > "$BACKUP_FILE"
            echo "✅ Backup créé : $BACKUP_FILE"
            # Conserver les 10 derniers backups seulement
            ls -t /var/backups/leopardo/*.dump | tail -n +11 | xargs -r rm
            # ──────────────────────────────────────────────────────────────

            # Exécuter les migrations (--force car on est en production)
            # En cas d'échec : pg_restore -Fc -U leopardo_user -d leopardo_db $BACKUP_FILE
            php artisan migrate --force

            # Vider et reconstruire le cache
            php artisan config:clear
            php artisan config:cache
            php artisan route:clear
            php artisan route:cache
            php artisan view:clear
            php artisan view:cache
            php artisan event:cache

            # Vider le cache Redis applicatif (pas les sessions)
            php artisan cache:clear

            # Redémarrer les workers de queue (Horizon)
            sudo supervisorctl restart leopardo-horizon:*

            # Désactiver le mode maintenance
            php artisan up

            echo "✅ Déploiement terminé avec succès — $(date)"

      - name: Health Check après déploiement
        run: |
          sleep 15
          response=$(curl -s -o /dev/null -w "%{http_code}" https://api.leopardo-rh.com/api/v1/health || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ API opérationnelle — HTTP $response"
          else
            echo "❌ API ne répond pas — HTTP $response"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # JOB 3 — Notification en cas d'échec
  # ─────────────────────────────────────────────
  notify-failure:
    name: Notify Deployment Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - name: Send failure alert
        run: |
          echo "🚨 DÉPLOIEMENT ÉCHOUÉ sur main"
          echo "Vérifier les logs GitHub Actions et l'état du serveur o2switch"
          # Optionnel: ajouter ici une notification Slack, email, etc.
