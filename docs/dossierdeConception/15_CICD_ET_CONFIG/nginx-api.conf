# /etc/nginx/sites-available/leopardo-rh-api
# Configuration Nginx pour l'API Laravel sur o2switch
# Activer : sudo ln -s /etc/nginx/sites-available/leopardo-rh-api /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name api.leopardo-rh.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.leopardo-rh.com;

    root /var/www/leopardo-rh-api/public;
    index index.php;

    # SSL (Let's Encrypt — configuré via cPanel o2switch)
    ssl_certificate /etc/letsencrypt/live/api.leopardo-rh.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.leopardo-rh.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Sécurité headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CORS (géré par Laravel, pas Nginx — éviter les doublons)
    # Les headers CORS sont ajoutés par le middleware CORS de Laravel

    # Taille max upload (pour import CSV employés)
    client_max_body_size 20M;

    # Logs
    access_log /var/log/nginx/leopardo-api-access.log;
    error_log /var/log/nginx/leopardo-api-error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Pas d'accès direct aux fichiers sensibles
    location ~ /(\.env|composer\.(json|lock)|package\.json) {
        deny all;
        return 404;
    }

    # ── SSE — Notifications temps réel (Server-Sent Events) ──────────────
    # CRITIQUE : désactiver le buffering Nginx pour le streaming SSE
    location ~ ^/api/v[0-9]+/notifications/stream {
        proxy_pass         http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
        proxy_set_header   X-Accel-Buffering no;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
    # ─────────────────────────────────────────────────────────────────────
}
